<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Perekup Dashboard{% endblock %}</title>
    <script>
    /* Apply saved theme before render to prevent flash of wrong theme */
    (function() {
        var saved = 'light';
        try { saved = localStorage.getItem('perekup_theme') || 'light'; } catch(e) {}
        if (saved === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    })();
    </script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header>
        <div class="container header-container">
            <h1><a href="/">PerekupHelper</a></h1>
            <button class="burger-btn" id="burger-btn" aria-label="Меню" aria-expanded="false">
                <span class="burger-line"></span>
                <span class="burger-line"></span>
                <span class="burger-line"></span>
            </button>
            <nav class="header-nav" id="header-nav">
                <a href="/">Объявления</a>
                <a href="/stats">Статистика</a>
            </nav>
            <button class="theme-toggle" id="theme-toggle" aria-label="Переключить тему" title="Переключить тему">
                <span class="theme-icon" id="theme-icon">&#9790;</span>
            </button>
            <span class="subtitle">Авто ниже рынка &mdash; Avito / Drom / Auto.ru</span>
        </div>
    </header>
    <script>
    (function() {
        var btn = document.getElementById('burger-btn');
        var nav = document.getElementById('header-nav');
        btn.addEventListener('click', function() {
            var open = nav.classList.toggle('nav-open');
            btn.classList.toggle('burger-open', open);
            btn.setAttribute('aria-expanded', open);
        });

        /* Theme toggle */
        var THEME_KEY = 'perekup_theme';
        var toggle = document.getElementById('theme-toggle');
        var icon = document.getElementById('theme-icon');

        function getTheme() {
            try { return localStorage.getItem(THEME_KEY) || 'light'; } catch(e) { return 'light'; }
        }

        function setThemeIcon(theme) {
            /* Moon for light mode (click to go dark), Sun for dark mode (click to go light) */
            icon.innerHTML = theme === 'dark' ? '&#9788;' : '&#9790;';
        }

        function applyTheme(theme) {
            if (theme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
            } else {
                document.documentElement.removeAttribute('data-theme');
            }
            setThemeIcon(theme);
            try { localStorage.setItem(THEME_KEY, theme); } catch(e) {}
        }

        /* Set initial icon based on current theme */
        setThemeIcon(getTheme());

        toggle.addEventListener('click', function() {
            var current = getTheme();
            var next = current === 'dark' ? 'light' : 'dark';
            document.body.classList.add('theme-transitioning');
            applyTheme(next);
            setTimeout(function() {
                document.body.classList.remove('theme-transitioning');
            }, 350);
        });
    })();
    </script>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
