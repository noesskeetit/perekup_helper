services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://perekup:${POSTGRES_PASSWORD}@db:5432/perekup_helper
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - DATABASE_URL=sqlite+aiosqlite:///./data/bot.db
      - APP_DATABASE_URL=postgresql+asyncpg://perekup:${POSTGRES_PASSWORD}@db:5432/perekup_helper
    volumes:
      - botdata:/app/data
    depends_on:
      db:
        condition: service_healthy
    command: ["python", "-m", "bot.main"]

  scheduler:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://perekup:${POSTGRES_PASSWORD}@db:5432/perekup_helper
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "while true; do
        echo '[scheduler] Running pipeline...' &&
        python -c 'import asyncio; from app.parsers.pipeline import run_pipeline; asyncio.run(run_pipeline())' &&
        echo '[scheduler] Running retrain...' &&
        python -c 'import asyncio; from app.services.pricing_trainer import train_model, score_listings; asyncio.run(train_model()); asyncio.run(score_listings(limit=5000))' &&
        echo '[scheduler] Done. Sleeping 6h...' &&
        sleep 21600;
      done"

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: perekup
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: perekup_helper
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U perekup -d perekup_helper"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

volumes:
  pgdata:
  botdata:
