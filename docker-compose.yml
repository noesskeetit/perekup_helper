services:
  dashboard:
    build: .
    ports:
      - "8001:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://perekup:perekup_secret@db:5432/perekup_helper
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: perekup
      POSTGRES_PASSWORD: perekup_secret
      POSTGRES_DB: perekup_helper
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U perekup -d perekup_helper"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
