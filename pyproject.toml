[project]
name = "perekup-helper-bot"
version = "0.1.0"
description = "Telegram-бот для уведомлений о выгодных авто-объявлениях"
requires-python = ">=3.11"
dependencies = [
    "aiogram>=3.13,<4",
    "aiosqlite>=0.20,<1",
    "sqlalchemy[asyncio]>=2.0,<3",
    "pydantic-settings>=2.0,<3",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0,<9",
    "pytest-asyncio>=0.24,<1",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
