[project]
name = "perekup-helper"
version = "0.1.0"
description = "AI-агрегатор для перекупов: парсинг авто-объявлений, анализ цен ниже рынка, AI-категоризация"
requires-python = ">=3.9"
dependencies = [
    "sqlalchemy[asyncio]>=2.0,<3.0",
    "asyncpg>=0.29,<1.0",
    "alembic>=1.13,<2.0",
    "pydantic-settings>=2.0,<3.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
]
